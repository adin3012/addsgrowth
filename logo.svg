<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" width="2040" height="600">
  <defs>

    <!-- Bar fill gradient -->
    <linearGradient id="barFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d9970"/>
      <stop offset="100%" stop-color="#2a7a58"/>
    </linearGradient>

    <!-- Top accent line on icon -->
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d9970"/>
      <stop offset="100%" stop-color="#3d9970" stop-opacity="0"/>
    </linearGradient>

    <!-- Icon border gradient -->
    <linearGradient id="iconBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d9970" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#3d9970" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3d9970" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Outer glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle shadow on text -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>

  </defs>

  <!-- ======= BACKGROUND ======= -->
  <rect width="680" height="200" fill="#0a0a0a"/>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
    <stop offset="0%" stop-color="#0a0a0a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#050505" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="680" height="200" fill="url(#vignette)"/>

  <!-- ======= ICON SYMBOL ======= -->

  <!-- Glow behind icon -->
  <rect x="24" y="22" width="156" height="156" rx="30" fill="#3d9970" fill-opacity="0.06"/>

  <!-- Icon card -->
  <rect x="26" y="24" width="152" height="152" rx="28" fill="#111111"/>
  <rect x="26" y="24" width="152" height="152" rx="28" fill="none" stroke="url(#iconBorder)" stroke-width="1.5"/>

  <!-- Top green accent bar -->
  <rect x="26" y="24" width="90" height="2.5" rx="1.25" fill="url(#accentLine)"/>

  <!-- ---- Bar Chart (content area x:46–162, y:48–158) ---- -->
  <!-- bar bottom: y=158, 4 bars each 20px wide, 8px gap, total=(4×20)+(3×8)=104, start-x=(46+(116-104)/2)=52 -->

  <!-- Bar 1 — 30% height = 33px, top y=125 -->
  <rect x="52"  y="125" width="20" height="33" rx="3" fill="#3d9970" fill-opacity="0.22"/>

  <!-- Bar 2 — 52% height = 57px, top y=101 -->
  <rect x="80"  y="101" width="20" height="57" rx="3" fill="#3d9970" fill-opacity="0.46"/>

  <!-- Bar 3 — 74% height = 81px, top y=77 -->
  <rect x="108" y="77"  width="20" height="81" rx="3" fill="#3d9970" fill-opacity="0.7"/>

  <!-- Bar 4 — 95% height = 104px, top y=54 -->
  <rect x="136" y="54"  width="20" height="104" rx="3" fill="url(#barFill)"/>

  <!-- Trend line connecting bar tops (center-x of each bar) -->
  <!-- centers: 62, 90, 118, 146  tops: 119, 95, 71, 48 -->
  <polyline
    points="62,119  90,95  118,71  146,48"
    fill="none"
    stroke="#3d9970"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Trend dot (end point) -->
  <circle cx="146" cy="48" r="8" fill="#3d9970" fill-opacity="0.18"/>
  <circle cx="146" cy="48" r="4.5" fill="#3d9970"/>

  <!-- Grid lines (very subtle) -->
  <line x1="46" y1="115" x2="162" y2="115" stroke="rgba(240,240,240,0.04)" stroke-width="1"/>
  <line x1="46" y1="90"  x2="162" y2="90"  stroke="rgba(240,240,240,0.04)" stroke-width="1"/>
  <line x1="46" y1="65"  x2="162" y2="65"  stroke="rgba(240,240,240,0.04)" stroke-width="1"/>


  <!-- ======= WORDMARK ======= -->

  <!-- Main logotype -->
  <text
    x="202"
    y="118"
    font-family="'Sora', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
    font-size="62"
    font-weight="800"
    letter-spacing="-2"
    fill="#f0f0f0">AddsGrowth<tspan fill="#3d9970" letter-spacing="0">.</tspan></text>

  <!-- Separator line -->
  <rect x="202" y="132" width="40" height="1.5" rx="0.75" fill="#3d9970" fill-opacity="0.5"/>

  <!-- Tagline -->
  <text
    x="202"
    y="156"
    font-family="'DM Mono', 'SF Mono', 'Fira Mono', 'Courier New', monospace"
    font-size="13.5"
    font-weight="400"
    letter-spacing="3.5"
    fill="rgba(240,240,240,0.38)">WE BUILD. YOU GROW.</text>

</svg>
