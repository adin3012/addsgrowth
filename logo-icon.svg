<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="800" height="800">
  <defs>

    <linearGradient id="barFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4aaa85"/>
      <stop offset="100%" stop-color="#2a7a58"/>
    </linearGradient>

    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d9970"/>
      <stop offset="100%" stop-color="#3d9970" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="iconBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d9970" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#3d9970" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3d9970" stop-opacity="0.02"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0f1f19"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0a"/>
  <rect width="400" height="400" fill="url(#bgGlow)"/>

  <!-- ======= ICON CARD ======= -->

  <!-- Outer glow halo -->
  <rect x="56" y="52" width="288" height="222" rx="44" fill="#3d9970" fill-opacity="0.07"/>

  <!-- Card body -->
  <rect x="58" y="54" width="284" height="218" rx="42" fill="#111111"/>
  <rect x="58" y="54" width="284" height="218" rx="42" fill="none" stroke="url(#iconBorder)" stroke-width="2"/>

  <!-- Top accent line -->
  <rect x="58" y="54" width="160" height="3.5" rx="1.75" fill="url(#accentLine)"/>

  <!-- ---- Bar Chart ---- -->
  <!-- Content area: x 82–318 (236px), y 84–244 (160px) -->
  <!-- 4 bars × 38px wide + 3 gaps × 14px = 152+42=194px, offset=(236-194)/2=21, start x=103 -->
  <!-- bar bottom: y=244 -->

  <!-- Bar 1 — 28% = 45px, top=199 -->
  <rect x="103" y="199" width="38" height="45" rx="5" fill="#3d9970" fill-opacity="0.20"/>

  <!-- Bar 2 — 50% = 80px, top=164 -->
  <rect x="155" y="164" width="38" height="80" rx="5" fill="#3d9970" fill-opacity="0.44"/>

  <!-- Bar 3 — 73% = 117px, top=127 -->
  <rect x="207" y="127" width="38" height="117" rx="5" fill="#3d9970" fill-opacity="0.68"/>

  <!-- Bar 4 — 95% = 152px, top=92 -->
  <rect x="259" y="92"  width="38" height="152" rx="5" fill="url(#barFill)"/>

  <!-- Trend line (center of each bar, at top) -->
  <!-- centers: 122, 174, 226, 278  |  tops: 193, 158, 121, 86 -->
  <polyline
    points="122,193  174,158  226,121  278,86"
    fill="none"
    stroke="#3d9970"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- End dot -->
  <circle cx="278" cy="86" r="14" fill="#3d9970" fill-opacity="0.15"/>
  <circle cx="278" cy="86" r="7"  fill="#3d9970"/>

  <!-- Subtle horizontal grid lines -->
  <line x1="82" y1="200" x2="318" y2="200" stroke="rgba(240,240,240,0.05)" stroke-width="1"/>
  <line x1="82" y1="165" x2="318" y2="165" stroke="rgba(240,240,240,0.05)" stroke-width="1"/>
  <line x1="82" y1="130" x2="318" y2="130" stroke="rgba(240,240,240,0.05)" stroke-width="1"/>


  <!-- ======= WORDMARK BELOW CARD ======= -->

  <!-- "AddsGrowth." -->
  <text
    x="200"
    y="322"
    text-anchor="middle"
    font-family="'Sora', 'Inter', -apple-system, system-ui, sans-serif"
    font-size="42"
    font-weight="800"
    letter-spacing="-1.5"
    fill="#f0f0f0">AddsGrowth<tspan fill="#3d9970" letter-spacing="0">.</tspan></text>

  <!-- Tagline -->
  <text
    x="200"
    y="358"
    text-anchor="middle"
    font-family="'DM Mono', 'SF Mono', monospace"
    font-size="11"
    letter-spacing="3"
    fill="rgba(240,240,240,0.35)">WE BUILD. YOU GROW.</text>

</svg>
