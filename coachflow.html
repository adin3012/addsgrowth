<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--green:#3d9970;--white:#f0f0f0;--gray:#888}

header{width:100%;padding:1.5rem 5%;display:flex;justify-content:center}

.back svg{width:16px;height:16px}
.video-container{flex:1;width:100%;max-width:1200px;padding:2rem 5%;display:flex;align-items:center;justify-content:center}
video{width:100%;max-width:1000px;border-radius:12px;background:#000;box-shadow:0 20px 60px rgba(0,0,0,.5)}
footer{width:100%;text-align:center;padding:2rem 5%;color:var(--gray);font-size:.85rem}
footer a{color:var(--green);text-decoration:none}
</style>
